<Center>
<body>

    <button><a href="index.html">Back to Home</a></button>
    
    <form action="First Name"></form>
    <label for="First Name">First Name</label><br>
    <input type="" name="" id="First Name" placeholder="Ade"> <br>

<br>

    <label for="Last Name">Last Name</label><br>
    <input type="text" name="" id="Last Name" placeholder="Ishola">

<br>
<br>

<label for="Phone Number">Phone Number</label><br>
<input type="number" name="" id="Phone Number" placeholder="08020457584"> 

<br>
<br>

<label for="Email">Email</label><br>
<input type="email" name="" id="Email" placeholder="@gmail.com">

<br> <br>

<input type="Date" name="" id="Date"> <br> <br>


<label for="Password">Password</label><br>

<br><br>

<!-- RADIO- FOR ONE SELECTION -->

<P>Select your Gender</P> <br>

<input type="radio" name="Gender" id="">

<input type="radio" name="Gender" id="">
<label for="male">Male</label> <br> <br>

<input type="radio" name="Gender" id="">
<label for="">Others</label>

<!-- CHECKBOXES - FOR MULTIPLE SELECTION -->

<br>

<br>

 <P>Select your State</P>

</form>
